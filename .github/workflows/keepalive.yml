name: keep-alive
# Pings the live site every ~10 minutes so Render's free plan never puts it to
# sleep. A sleeping free instance cold-starts (500/502) on the next request;
# this warmer prevents that. Runs on GitHub's servers, 24/7, independent of any
# local machine. Free (unlimited Actions minutes on public repos).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm uthant.onrender.com
        run: |
          for i in 1 2 3 4; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 90 https://uthant.onrender.com/ || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 25
          done
          echo "::warning::site did not return 200 after retries (may still be booting)"
