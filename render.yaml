services:
  - type: web
    name: uthant
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        sync: false # set to your domain in the dashboard
      - key: ADMIN_PASSWORD
        sync: false # set a strong password in the dashboard
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
# NOTE: Free plan has no persistent disk — admin content edits + uploads reset on
# redeploy/restart (the site still works from baked-in defaults). To make them
# persist, upgrade to a paid plan and re-add:
#   disk:
#     name: uthant-data
#     mountPath: /data
#     sizeGB: 1
